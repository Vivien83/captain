name: Release

on:
  # Releases are published locally by scripts/publish-release-local.sh.
  # Keep this workflow as an explicit fallback only, so pushing a tag never
  # consumes GitHub Actions minutes automatically.
  workflow_dispatch:
    inputs:
      prerelease:
        description: Mark the GitHub Release as a prerelease
        required: true
        default: true
        type: boolean
      image_channel:
        description: Moving GHCR channel tag for this release
        required: true
        default: alpha
        type: choice
        options:
          - alpha
          - beta
          - rc
          - latest

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cli:
    name: CLI / ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    env:
      # Compile-time version baked into the binary via option_env!() —
      # see crates/captain-types/src/version.rs. Without this every
      # release binary self-reports the static Cargo.toml version
      # instead of the actual tag.
      CAPTAIN_BUILD_VERSION: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            archive: tar.gz
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: cli-${{ matrix.target }}

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked

      - name: Build CLI (cross)
        if: matrix.cross == true
        # Default features stay ON: local-embeddings must ship in release binaries
        # (ort-load-dynamic does not link ONNX at build time).
        run: cross build --profile release-fast --target ${{ matrix.target }} -p captain-cli --bin captain

      - name: Build CLI
        if: matrix.cross != true
        run: cargo build --profile release-fast --target ${{ matrix.target }} -p captain-cli --bin captain

      - name: Ad-hoc codesign CLI binary (macOS)
        if: runner.os == 'macOS'
        run: |
          xattr -cr target/${{ matrix.target }}/release-fast/captain || true
          codesign --force --sign - target/${{ matrix.target }}/release-fast/captain

      # Reuses the same packager maintainers run locally (scripts/release-all.sh)
      # instead of re-implementing tarball layout inline: this is what embeds
      # VERSION, captain.toml.example, the per-platform manifest, and a copy
      # of install.sh/install-local.sh/install-git.sh next to the archive.
      # install.sh already expects this exact layout (it looks for a VERSION
      # file next to the binary) — it was just never fed it from CI.
      - name: Package Unix (via scripts/package-release.sh)
        if: matrix.archive == 'tar.gz'
        shell: bash
        env:
          CAPTAIN_SKIP_BUILD: "1"
          CAPTAIN_BIN_PATH: target/${{ matrix.target }}/release-fast/captain
          CAPTAIN_DIST_PLATFORM: ${{ matrix.target }}
          CAPTAIN_VERSION: ${{ github.ref_name }}
        run: bash scripts/package-release.sh

      - name: Upload packaged artifacts (Unix)
        if: matrix.archive == 'tar.gz'
        uses: actions/upload-artifact@v4
        with:
          name: captain-${{ matrix.target }}
          path: |
            dist/releases/${{ github.ref_name }}/captain-${{ matrix.target }}.tar.gz
            dist/releases/${{ github.ref_name }}/captain-${{ matrix.target }}.tar.gz.sha256
            dist/releases/${{ github.ref_name }}/manifest-${{ matrix.target }}.json
            dist/releases/${{ github.ref_name }}/install.sh
            dist/releases/${{ github.ref_name }}/install-local.sh
            dist/releases/${{ github.ref_name }}/install-git.sh
          if-no-files-found: error

      # package-release.sh is bash/tar-only; Windows keeps its own packaging
      # but still gets a VERSION file next to the binary for parity (the
      # runtime's captain_version() checks for it as a fallback — see
      # crates/captain-types/src/version.rs).
      - name: Package Windows
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $archive = "captain-${{ matrix.target }}.zip"
          $stage = "stage-windows"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release-fast/captain.exe" "$stage/captain.exe"
          "${{ github.ref_name }}" | Out-File -Encoding ASCII -NoNewline "$stage/VERSION"
          Compress-Archive -Path "$stage/*" -DestinationPath $archive
          $hash = (Get-FileHash $archive -Algorithm SHA256).Hash.ToLower()
          "$hash  $archive" | Out-File -Encoding ASCII "$archive.sha256"
          $manifest = [ordered]@{
            version = "${{ github.ref_name }}"
            platform = "${{ matrix.target }}"
            archive = $archive
            sha256 = $hash
            generated_at = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          } | ConvertTo-Json
          $manifest | Out-File -Encoding utf8 "manifest-${{ matrix.target }}.json"
          Copy-Item "scripts/install.ps1" "install.ps1"

      - name: Upload packaged artifacts (Windows)
        if: matrix.archive == 'zip'
        uses: actions/upload-artifact@v4
        with:
          name: captain-${{ matrix.target }}
          path: |
            captain-${{ matrix.target }}.zip
            captain-${{ matrix.target }}.zip.sha256
            manifest-${{ matrix.target }}.json
            install.ps1
          if-no-files-found: error

      - name: Prepare deterministic Docker embedding cache
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        shell: bash
        env:
          CAPTAIN_HOME: ${{ runner.temp }}/captain-docker-home
        run: |
          set -euo pipefail
          target/${{ matrix.target }}/release-fast/captain embeddings install
          CAPTAIN_FASTEMBED_CACHE="$CAPTAIN_HOME/.fastembed_cache" \
            bash scripts/prepare-docker-embedding-cache.sh

      - name: Upload deterministic Docker embedding cache
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: docker-embedding-cache
          path: dist/docker/fastembed-cache/
          if-no-files-found: error

  docker:
    name: Docker image
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    needs: cli
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Download validated Linux release bundles
        uses: actions/download-artifact@v4
        with:
          pattern: captain-*-unknown-linux-gnu
          path: dist/releases/${{ github.ref_name }}
          merge-multiple: true

      - name: Download deterministic Docker embedding cache
        uses: actions/download-artifact@v4
        with:
          name: docker-embedding-cache
          path: dist/docker/fastembed-cache

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase image owner
        id: image
        run: echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            CAPTAIN_RELEASE_VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/${{ steps.image.outputs.owner }}/captain-agent-os:${{ github.ref_name }}
            ghcr.io/${{ steps.image.outputs.owner }}/captain-agent-os:${{ inputs.image_channel }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish:
    name: Publish release
    runs-on: ubuntu-22.04
    needs: [cli, docker]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/release-assets
          pattern: captain-*
          merge-multiple: true

      # Each platform job only sees its own binary, so it can only emit a
      # per-platform manifest-<target>.json. This is the one job that sees
      # every platform's artifact at once — the only place a true aggregate
      # manifest.json (all platforms + hashes) can be assembled.
      - name: Generate aggregate manifest.json
        run: |
          set -euo pipefail
          jq -s \
            --arg version "${{ github.ref_name }}" \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{version: $version, generated_at: $generated_at, artifacts: map({platform, archive, sha256})}' \
            dist/release-assets/manifest-*.json > dist/release-assets/manifest.json

      - name: List release assets
        run: ls -lh dist/release-assets

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/release-assets/*
          generate_release_notes: true
          prerelease: ${{ inputs.prerelease }}
          make_latest: ${{ inputs.prerelease && 'false' || 'true' }}
