id = "mempalace"
name = "MemPalace"
description = "Captain-managed local memory — hierarchical palace, temporal knowledge graph, and semantic search"
category = "memory"
icon = "🏛️"
tags = ["memory", "knowledge-graph", "embeddings", "semantic-search", "local"]

[transport]
type = "stdio"
command = "captain"
args = ["memory", "mcp-serve"]

[health_check]
interval_secs = 120
unhealthy_threshold = 3

setup_instructions = """
1. MemPalace is installed automatically by the official Captain installer.
2. Check live readiness with: captain memory doctor
3. Repair the isolated runtime and palace with: captain memory install --force
4. No API key or system Python is required for local stdio mode.
5. If MemPalace is exposed remotely, require bearer authentication. Never expose an unauthenticated memory endpoint.
"""
