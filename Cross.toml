# Images pinned to 0.2.5 (Ubuntu 16.04) on purpose: their older glibc keeps
# the release binaries compatible with Debian 12 / Ubuntu 22.04 and newer.
# The default `:main` images use a newer glibc that rejects those common VPS
# targets at startup.
[build.env]
passthrough = ["CAPTAIN_BUILD_VERSION"]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:0.2.5"
pre-build = [
  "if ! curl -fsS --connect-timeout 5 --max-time 15 http://ports.ubuntu.com/ubuntu-ports/dists/xenial/Release >/dev/null; then sed -i 's|http://ports.ubuntu.com/ubuntu-ports|http://mirrors.ocf.berkeley.edu/ubuntu-ports|g' /etc/apt/sources.list.d/ports.list; fi",
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update && apt-get install --assume-yes libssl-dev:$CROSS_DEB_ARCH"
]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:0.2.5"
pre-build = [
  "rm -f /etc/apt/sources.list.d/ports.list",
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update && apt-get install --assume-yes libssl-dev:$CROSS_DEB_ARCH"
]
