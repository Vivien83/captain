# Images pinned to 0.2.5 (Ubuntu 20.04, glibc 2.31) on purpose: the default
# `:main` images are Ubuntu 24.04 (glibc 2.39), and binaries built there
# refuse to run on Debian 12 / Ubuntu 22.04 — i.e. most real VPS targets.
[build.env]
passthrough = ["CAPTAIN_BUILD_VERSION"]

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:0.2.5"
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update && apt-get install --assume-yes libssl-dev:$CROSS_DEB_ARCH"
]

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-gnu:0.2.5"
pre-build = [
  "dpkg --add-architecture $CROSS_DEB_ARCH",
  "apt-get update && apt-get install --assume-yes libssl-dev:$CROSS_DEB_ARCH"
]
